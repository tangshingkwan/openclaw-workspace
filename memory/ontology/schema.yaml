types:
  Person:
    required:
      - name
  Project:
    required:
      - name
      - status
  Task:
    required:
      - title
      - status
    status_enum:
      - open
      - in_progress
      - blocked
      - done
  Event:
    required:
      - title
      - start
  Flight:
    required:
      - flight_number
      - route
  Accommodation:
    required:
      - name
  Location:
    required:
      - name
  Account:
    required:
      - service
  Credential:
    required:
      - service
  System:
    required:
      - name
  Group:
    required:
      - name
relations:
  has_owner:
    from_types:
      - Project
    to_types:
      - Person
    cardinality: many_to_one
  has_member:
    from_types:
      - Project
      - Group
    to_types:
      - Person
    cardinality: many_to_many
  has_task:
    from_types:
      - Project
    to_types:
      - Task
    cardinality: one_to_many
  has_event:
    from_types:
      - Project
    to_types:
      - Event
    cardinality: one_to_many
  has_outbound_flight:
    from_types:
      - Project
    to_types:
      - Flight
    cardinality: one_to_one
  has_return_flight:
    from_types:
      - Project
    to_types:
      - Flight
    cardinality: one_to_one
  has_accommodation:
    from_types:
      - Project
    to_types:
      - Accommodation
    cardinality: one_to_many
  member_of:
    from_types:
      - Person
    to_types:
      - Group
    cardinality: many_to_many
  part_of:
    from_types:
      - Event
    to_types:
      - Project
    cardinality: many_to_one
  followed_by:
    from_types:
      - Event
    to_types:
      - Event
    cardinality: one_to_many
    acyclic: true
  has_account:
    from_types:
      - Person
    to_types:
      - Account
    cardinality: one_to_many
  runs_on:
    from_types:
      - Person
    to_types:
      - System
    cardinality: many_to_one
  departs_from:
    from_types:
      - Flight
    to_types:
      - Location
    cardinality: one_to_one
  arrives_at:
    from_types:
      - Flight
    to_types:
      - Location
    cardinality: one_to_one
